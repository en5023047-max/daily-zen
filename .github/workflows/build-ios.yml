name: Build iOS App on macOS Cloud

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: 📥 استلام الكود
        uses: actions/checkout@v4
      
      - name: 🔧 إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 📦 تثبيت الاعتماديات
        run: npm install
      
      - name: 🍎 تثبيت Expo CLI
        run: npm install -g expo-cli
      
      - name: 📝 إنشاء app.json بدون أي صور
        run: |
          cat > app.json << 'EOF'
          {
            "expo": {
              "name": "daily-zen",
              "slug": "daily-zen",
              "version": "1.0.0",
              "orientation": "portrait",
              "userInterfaceStyle": "light",
              "assetBundlePatterns": ["**/*"],
              "ios": {
                "supportsTablet": true,
                "bundleIdentifier": "com.dailyzen.app"
              },
              "android": {
                "package": "com.dailyzen.app"
              }
            }
          }
          EOF
      
      - name: 🗑️ حذف مجلد assets إذا وجد
        run: rm -rf assets || true
      
      - name: 🏗️ Prebuild مشروع iOS (بدون صور)
        run: npx expo prebuild --platform ios --clean
      
      - name: 🛠️ بناء التطبيق
        run: |
          cd ios
          
          xcodebuild -workspace daily-zen.xcworkspace \
            -scheme daily-zen \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            -derivedDataPath build \
            clean build
          
          PAYLOAD_PATH="build/Build/Products/Release-iphoneos/daily-zen.app"
          
          if [ -d "$PAYLOAD_PATH" ]; then
            mkdir -p Payload
            cp -r "$PAYLOAD_PATH" Payload/
            zip -r ../daily-zen.ipa Payload
            echo "✅ تم إنشاء IPA بنجاح!"
            ls -la ../daily-zen.ipa
          else
            echo "❌ لم نجد ملف .app"
            exit 1
          fi
      
      - name: 📤 رفع IPA
        uses: actions/upload-artifact@v4
        with:
          name: daily-zen-ipa
          path: daily-zen.ipa