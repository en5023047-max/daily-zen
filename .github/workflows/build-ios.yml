name: Build Valid iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install
          npm install -g expo-cli
      
      - name: Create assets folder with dummy images
        run: |
          mkdir -p assets
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 --decode > assets/icon.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 --decode > assets/splash.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 --decode > assets/adaptive-icon.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 --decode > assets/favicon.png
      
      - name: Create minimal app.json
        run: |
          cat > app.json << 'EOF'
          {
            "expo": {
              "name": "daily-zen",
              "slug": "daily-zen",
              "version": "1.0.0",
              "orientation": "portrait",
              "icon": "./assets/icon.png",
              "userInterfaceStyle": "light",
              "splash": {
                "resizeMode": "contain",
                "backgroundColor": "#ffffff"
              },
              "assetBundlePatterns": ["**/*"],
              "ios": {
                "supportsTablet": true,
                "bundleIdentifier": "com.en5023047.dailyzen"
              },
              "android": {
                "package": "com.en5023047.dailyzen"
              }
            }
          }
          EOF
      
      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean
      
      - name: Build IPA
        run: |
          cd ios
          xcodebuild -workspace daily-zen.xcworkspace \
            -scheme daily-zen \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
          
          # إنشاء IPA
          mkdir Payload
          cp -r build/Release-iphoneos/daily-zen.app Payload/
          zip -r ../daily-zen.ipa Payload
          
          # التحقق من حجم الملف
          ls -la ../daily-zen.ipa
      
      - name: Verify IPA file
        run: |
          if [ -f "daily-zen.ipa" ] && [ -s "daily-zen.ipa" ]; then
            echo "✅ IPA file created successfully"
            file daily-zen.ipa
            unzip -l daily-zen.ipa | head -20
          else
            echo "❌ IPA file is empty or missing"
            exit 1
          fi
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: daily-zen-ipa
          path: daily-zen.ipa
          if-no-files-found: error