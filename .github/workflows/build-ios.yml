name: Build iOS IPA (Simplified)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install
          npm install -g expo-cli
      
      - name: Create minimal app.json
        run: |
          echo '{
            "expo": {
              "name": "daily-zen",
              "slug": "daily-zen",
              "version": "1.0.0",
              "orientation": "portrait",
              "userInterfaceStyle": "light",
              "assetBundlePatterns": ["**/*"],
              "ios": {
                "supportsTablet": true,
                "bundleIdentifier": "com.en5023047.dailyzen"
              }
            }
          }' > app.json
      
      - name: Create empty assets
        run: |
          mkdir -p assets
          touch assets/icon.png assets/splash.png
      
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean
      
      - name: Install pods
        run: |
          cd ios
          pod install
      
      - name: Build IPA
        run: |
          cd ios
          xcodebuild -workspace daily-zen.xcworkspace \
            -scheme daily-zen \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build
          
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/daily-zen.app Payload/
          zip -r ../daily-zen.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: daily-zen-ipa
          path: daily-zen.ipa