name: Build iOS IPA (Simplified)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Expo CLI
        run: npm install -g expo-cli
      
      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean
      
      - name: Build IPA without signing
        run: |
          cd ios
          xcodebuild -workspace daily-zen.xcworkspace \
            -scheme daily-zen \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            clean build
          
          # Create IPA
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/daily-zen.app Payload/
          zip -r ../daily-zen.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: daily-zen-ipa
          path: daily-zen.ipa